name: Keep Render dyno warm

# Render free tier puts the service to sleep after ~15 min of inactivity.
# Pings /health every 14 minutes 24/7 — Apple App Review opère sur des
# fuseaux US business hours qui couvrent largement la nuit Bruxelles.
# Sans 24/7, le reviewer tombait potentiellement sur un cold start 10 s
# au lancement = motif de rejet "doesn't load reliably".
#
# /health est intentionnellement DB-free (~50 ms), donc 24/7 keep-warm
# n'augmente pas significativement le runtime Render. Le compteur 750 h/mois
# du free tier mesure le dyno-uptime, pas les requêtes — le dyno tournerait
# de toute façon dès qu'un user réel arrive.

on:
  schedule:
    - cron: "*/14 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping /health
        run: |
          for attempt in 1 2 3; do
            echo "Attempt $attempt..."
            if curl --silent --show-error --max-time 60 \
                 --fail https://stib-alert-backend.onrender.com/health; then
              echo " — backend is warm."
              exit 0
            fi
            echo " — failed, retrying after 20s."
            sleep 20
          done
          echo "All 3 attempts failed."
          exit 1
