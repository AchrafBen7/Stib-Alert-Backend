name: Keep Render dyno warm

# Render free tier puts the service to sleep after ~15 min of inactivity.
# This workflow pings /health every 14 minutes during Brussels waking hours
# (05:00 — 23:59 UTC ≈ 06:00 — 00:59 local in winter / 07:00 — 01:59 summer),
# which is enough to keep the container hot for ~99% of real-world traffic
# while letting it sleep overnight to stay within the free-tier compute budget.

on:
  schedule:
    - cron: "*/14 5-23 * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping /health
        run: |
          for attempt in 1 2 3; do
            echo "Attempt $attempt..."
            if curl --silent --show-error --max-time 60 \
                 --fail https://stib-alert-backend.onrender.com/health; then
              echo " — backend is warm."
              exit 0
            fi
            echo " — failed, retrying after 20s."
            sleep 20
          done
          echo "All 3 attempts failed."
          exit 1
